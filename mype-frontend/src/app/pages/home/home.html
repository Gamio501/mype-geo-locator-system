<header class="navbar">
  <div class="logo">🛒 MypeApp</div>

  <div class="nav-right">
    <span *ngIf="isLogged()" class="user">
      Hola 👋 {{ getUser() }}
      <span *ngIf="getRol() === 'mype'" class="badge">Negocio</span>
    </span>

    <button *ngIf="getRol() === 'mype'" class="btn secondary" (click)="goMype()">
      Mi Mype
    </button>

    <button *ngIf="!isLogged()" class="btn" (click)="goLogin()">Login</button>

    <button *ngIf="!isLogged()" class="btn primary" (click)="goRegister()">
      Registrarse
    </button>

    <button *ngIf="isLogged()" class="btn danger" (click)="logout()">
      Salir
    </button>
  </div>
</header>

<section class="mypes">

  <h2>Mypes registradas</h2>

  <input 
    type="text" 
    placeholder="Buscar por nombre, RUC o dirección..." 
    [(ngModel)]="busqueda"
    class="search"
  />

  <p *ngIf="errorCarga">{{ errorCarga }}</p>

  <div class="grid">

    <div class="card" *ngFor="let m of mypesFiltradas">

      <div class="card-header">
        <div class="icon">🏪</div>
        <span class="estado">
          ID: {{ m.id }}
        </span>
      </div>

      <h3>{{ m.nombreComercial }}</h3>

      <p class="price">📄 RUC: {{ m.ruc }}</p>

      <p class="mype">📍 {{ m.direccion }}</p>

      <p class="coords">
        🌐 Lat: {{ m.latitud }} | Lng: {{ m.longitud }}
      </p>

      <button class="btn-buy" (click)="verDetalle(m)">
        Ver detalle
      </button>

    </div>

  </div>

</section>
