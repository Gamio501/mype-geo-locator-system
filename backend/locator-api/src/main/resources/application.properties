spring.application.name=locator-api
# ==========================================================
# 1. CONEXIÓN A LA BASE DE DATOS (DataSource)
# ==========================================================
# Cambia 'mype_db' por el nombre que creaste en MySQL Workbench
spring.datasource.url=jdbc:mysql://localhost:3306/mype_db?serverTimezone=UTC&useSSL=false
spring.datasource.username=root
spring.datasource.password=4779

# El driver específico para que Java hable con MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================================
# 2. CONFIGURACIÓN DE JPA / HIBERNATE
# ==========================================================
# 'update' crea las tablas automáticamente si no existen (ideal para el avance)
spring.jpa.hibernate.ddl-auto=update

# Muestra en la consola de VS Code las consultas SQL que hace Java (para que veas que funciona)
spring.jpa.show-sql=true

# Formatea el SQL en la consola para que sea legible
spring.jpa.properties.hibernate.format_sql=true
# ==========================================================
# 3. CONFIGURACIÓN DEL SERVIDOR
# ==========================================================
# Puerto por defecto, pero puedes cambiarlo si tienes conflictos
server.port=8080